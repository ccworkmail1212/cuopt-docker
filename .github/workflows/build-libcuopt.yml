name: Build libcuopt.so (Ubuntu 22.04 compatible)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch/commit in ccworkmail1212/cuopt to build'
        required: false
        default: 'main'

jobs:
  build-libcuopt:
    name: Build libcuopt.so on Ubuntu 22.04
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: workcc
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clone cuopt source
        run: |
          git clone --depth=1 --branch ${{ inputs.source_ref }} \
            https://github.com/ccworkmail1212/cuopt.git /tmp/cuopt-src

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: cuopt-ccache-u22-${{ hashFiles('/tmp/cuopt-src/cpp/**/*.cu', '/tmp/cuopt-src/cpp/**/*.cpp') }}
          restore-keys: |
            cuopt-ccache-u22-

      - name: Build libcuopt.so inside Ubuntu 22.04 dev container
        run: |
          docker run --rm \
            -v /tmp/cuopt-src:/cuopt \
            -v /tmp/ccache:/root/.cache/ccache \
            -v /tmp/cuopt-src/ci/docker/build_cuopt.sh:/usr/local/bin/cuopt-build \
            --workdir /cuopt \
            -e PARALLEL_LEVEL=4 \
            workcc/cuopt-dev:26.6.0a \
            bash -c "chmod +x /usr/local/bin/cuopt-build && cuopt-build 2>&1 | tail -20"

      - name: Verify build artifacts
        run: |
          ls -lh /tmp/cuopt-src/cpp/build/libcuopt.so
          ls -lh /tmp/cuopt-src/cpp/build/cuopt_cli

      - name: Upload libcuopt.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcuopt-ubuntu22-${{ github.run_number }}
          path: |
            /tmp/cuopt-src/cpp/build/libcuopt.so
            /tmp/cuopt-src/cpp/build/cuopt_cli
          retention-days: 7
