name: Build libcuopt.so (Ubuntu 22.04 compatible)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch/commit in ccworkmail1212/cuopt to build'
        required: false
        default: 'main'

jobs:
  build-libcuopt:
    name: Build libcuopt.so on Ubuntu 22.04
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: workcc
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clone cuopt source
        run: |
          git clone --depth=1 --branch ${{ inputs.source_ref }} \
            https://github.com/ccworkmail1212/cuopt.git /tmp/cuopt-src

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: cuopt-ccache-u22-${{ github.run_number }}
          restore-keys: cuopt-ccache-u22-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Ubuntu 22.04 dev image (not pushed, local only)
        uses: docker/build-push-action@v5
        with:
          context: /tmp/cuopt-src
          file: /tmp/cuopt-src/Dockerfile.dev-official
          push: false
          load: true
          tags: cuopt-dev-u22:local
          cache-from: type=gha,scope=cuopt-dev-u22
          cache-to: type=gha,mode=max,scope=cuopt-dev-u22

      - name: Build libcuopt.so inside Ubuntu 22.04 container
        run: |
          docker run --rm \
            -v /tmp/cuopt-src:/cuopt \
            -v /tmp/ccache:/root/.cache/ccache \
            -v /tmp/cuopt-src/ci/docker/build_cuopt.sh:/usr/local/bin/cuopt-build \
            --workdir /cuopt \
            -e PARALLEL_LEVEL=4 \
            cuopt-dev-u22:local \
            bash -c "
            chmod +x /usr/local/bin/cuopt-build
            cuopt-build 2>&1 | tail -30
            echo '--- Verification ---'
            ldd cpp/build/libcuopt.so | grep GLIBC | awk '{print \$1}' | sort -u | tail -5
            "

      - name: Verify artifacts
        run: |
          echo "libcuopt.so: $(ls -lh /tmp/cuopt-src/cpp/build/libcuopt.so)"
          echo "cuopt_cli:   $(ls -lh /tmp/cuopt-src/cpp/build/cuopt_cli)"
          echo "GLIBC max:   $(objdump -T /tmp/cuopt-src/cpp/build/libcuopt.so | grep GLIBC | awk '{print $5}' | sort -V | tail -1)"

      - name: Upload libcuopt.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcuopt-ubuntu22-${{ github.run_number }}
          path: |
            /tmp/cuopt-src/cpp/build/libcuopt.so
            /tmp/cuopt-src/cpp/build/cuopt_cli
            /tmp/cuopt-src/ci/docker/libglibc_compat.so
          retention-days: 30
