name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  push-src:
    name: Push cuopt-src (source code image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone NVIDIA/cuopt source
        run: git clone --depth=1 https://github.com/NVIDIA/cuopt.git /tmp/cuopt-src

      - name: Copy Dockerfile.src into source dir
        run: cp Dockerfile.src /tmp/cuopt-src/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: workcc
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push cuopt-src
        uses: docker/build-push-action@v5
        with:
          context: /tmp/cuopt-src
          file: /tmp/cuopt-src/Dockerfile.src
          push: true
          tags: workcc/cuopt-src:26.6

  push-package:
    name: Tag cuopt-custom:latest
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: workcc
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and tag as latest
        run: |
          docker pull workcc/cuopt-custom:26.6.0a
          docker tag workcc/cuopt-custom:26.6.0a workcc/cuopt-custom:latest
          docker push workcc/cuopt-custom:latest
          echo "cuopt-custom:latest updated"
