name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:  # 也可以手動觸發

jobs:
  push-src:
    name: Push cuopt-src
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: workcc
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push cuopt-src
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.src
          push: true
          tags: workcc/cuopt-src:26.6

  push-package:
    name: Push cuopt-custom
    runs-on: ubuntu-latest
    needs: push-src
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: workcc
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push cuopt-package
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.package
          push: true
          tags: workcc/cuopt-custom:26.6.0a
